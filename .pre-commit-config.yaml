# Pre-commit hooks for chan_dongle
# Install: pip install pre-commit && pre-commit install

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(md|txt|in|m4)$|(^|/)configure$|(^|/)compile$|(^|/)config\.(guess|sub)$|(^|/)depcomp$|(^|/)install-sh$|(^|/)ltmain\.sh$|(^|/)missing$|(^|/)test-driver$|(^|/)Makefile$'
      - id: end-of-file-fixer
        exclude: '\.(md|txt|in|m4)$|(^|/)configure$|(^|/)compile$|(^|/)config\.(guess|sub)$|(^|/)depcomp$|(^|/)install-sh$|(^|/)ltmain\.sh$|(^|/)missing$|(^|/)test-driver$|(^|/)Makefile$'
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: fix-byte-order-marker

  # C/C++ linting with cppcheck
  - repo: local
    hooks:
      - id: cppcheck
        name: cppcheck
        entry: cppcheck
        language: system
        files: '\.(c|h)$'
        args:
          - --enable=warning,performance,portability,missingInclude
          - --suppress=missingIncludeSystem
          - --suppress=unusedFunction
          - --suppress=unmatchedSuppression
          - --suppress=checkersReport
          - --suppress=unusedStructMember
          - --suppress=arithOperationsOnVoidPointer
          - --suppress=missingInclude
          - --suppress=normalCheckLevelMaxBranches
          - --suppress=uninitvar
          - --suppress=negativeIndex
          - --suppress=unknownMacro
          - --suppress=allocaCalled
          - --suppress=nullPointerRedundantCheck
          - --suppress=ctuNullPointer
          - --suppress=ctunullpointer
          - --suppress=invalidScanfArgType_int
          - --suppress=funcArgOrderDifferent
          - --suppress=preprocessorErrorDirective
          - --std=c11
          - --error-exitcode=1
          - --inline-suppr
          - -DASTERISK_VERSION_NUM=200190
          - -D_GNU_SOURCE
          - -DHAVE_CONFIG_H
          - -I.
